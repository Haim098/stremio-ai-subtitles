services:
  - type: web
    name: stremio-ai-subtitles
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: GEMINI_API_KEY
        value: AIzaSyDQLmPD2Rlyjk2NI4aEr_q1TUhs-wTPejI
      - key: NODE_ENV
        value: production
      # Set this in the Render dashboard (Environment tab). The server
      # still boots without it, but the SubDL source will be disabled.
      - key: SUBDL_API_KEY
        sync: false
