<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Subtitles — כתוביות חכמות בעברית</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #0a0a1a;
      --bg-secondary: #12122a;
      --bg-card: rgba(255,255,255,0.04);
      --bg-card-hover: rgba(255,255,255,0.08);
      --accent: #8b5cf6;
      --accent-glow: rgba(139, 92, 246, 0.3);
      --success: #22c55e;
      --error: #ef4444;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --border: rgba(255,255,255,0.08);
      --radius: 16px;
    }

    body {
      font-family: 'Heebo', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      direction: rtl;
      overflow-x: hidden;
    }

    /* ── Background Effect ── */
    body::before {
      content: '';
      position: fixed;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(ellipse at 30% 20%, rgba(139,92,246,0.08) 0%, transparent 50%),
                  radial-gradient(ellipse at 70% 80%, rgba(59,130,246,0.06) 0%, transparent 50%);
      z-index: -1;
      animation: bgFloat 20s ease-in-out infinite;
    }
    @keyframes bgFloat {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(-2%, 2%); }
    }

    .container { max-width: 1100px; margin: 0 auto; padding: 20px; }

    /* ── Header ── */
    .header {
      text-align: center;
      padding: 50px 20px 30px;
    }
    .header h1 {
      font-size: 3rem;
      font-weight: 900;
      background: linear-gradient(135deg, #8b5cf6, #3b82f6, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
    }
    .header p {
      color: var(--text-secondary);
      font-size: 1.15rem;
      font-weight: 300;
    }

    /* ── Search ── */
    .search-wrap {
      max-width: 600px;
      margin: 30px auto;
      position: relative;
    }
    .search-input {
      width: 100%;
      padding: 18px 24px 18px 50px;
      font-size: 1.1rem;
      font-family: 'Heebo', sans-serif;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 50px;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
      direction: rtl;
    }
    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 30px var(--accent-glow);
    }
    .search-input::placeholder { color: var(--text-muted); }
    .search-icon {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.3rem;
      color: var(--text-muted);
    }

    /* ── Section Title ── */
    .section-title {
      font-size: 1.3rem;
      font-weight: 700;
      margin: 40px 0 20px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
      color: var(--text-secondary);
    }
    .section-title span { color: var(--accent); }

    /* ── Movie Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 20px;
      margin: 20px 0;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
      cursor: default;
      position: relative;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
      border-color: rgba(139,92,246,0.3);
    }

    .card-poster {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      display: block;
    }
    .card-info {
      padding: 12px 14px;
    }
    .card-title {
      font-size: 0.95rem;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      font-size: 0.8rem;
      margin-bottom: 10px;
    }
    .card-rating {
      color: #fbbf24;
      font-weight: 600;
    }
    .card-type {
      background: rgba(139,92,246,0.2);
      color: var(--accent);
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 500;
    }

    /* ── Buttons ── */
    .btn {
      width: 100%;
      padding: 10px;
      font-family: 'Heebo', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-generate {
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      color: white;
    }
    .btn-generate:hover { box-shadow: 0 4px 20px var(--accent-glow); transform: scale(1.02); }
    .btn-generate:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-done {
      background: rgba(34,197,94,0.15);
      color: var(--success);
      cursor: default;
    }
    .btn-progress {
      background: rgba(139,92,246,0.15);
      color: var(--accent);
      cursor: wait;
      position: relative;
      overflow: hidden;
    }

    /* ── Progress Bar ── */
    .progress-bar {
      position: absolute;
      bottom: 0;
      right: 0;
      height: 3px;
      background: var(--accent);
      transition: width 0.5s ease;
      border-radius: 0 0 10px 10px;
    }

    /* ── Loading ── */
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
    }
    .spinner {
      display: inline-block;
      width: 30px; height: 30px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Empty State ── */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .empty-icon { font-size: 3rem; margin-bottom: 10px; }

    /* ── Stremio Install Banner ── */
    .install-banner {
      background: linear-gradient(135deg, rgba(139,92,246,0.1), rgba(59,130,246,0.1));
      border: 1px solid rgba(139,92,246,0.2);
      border-radius: var(--radius);
      padding: 24px;
      margin: 40px 0;
      text-align: center;
    }
    .install-banner h3 { margin-bottom: 8px; color: var(--text-primary); }
    .install-banner p { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 14px; }
    .install-url {
      display: inline-block;
      background: rgba(0,0,0,0.3);
      padding: 10px 20px;
      border-radius: 10px;
      font-family: monospace;
      font-size: 0.85rem;
      color: var(--accent);
      cursor: pointer;
      border: 1px solid var(--border);
      transition: border-color 0.3s;
    }
    .install-url:hover { border-color: var(--accent); }

    /* ── Footer ── */
    .footer {
      text-align: center;
      padding: 30px;
      color: var(--text-muted);
      font-size: 0.8rem;
      border-top: 1px solid var(--border);
      margin-top: 40px;
    }
    .footer img { height: 14px; vertical-align: middle; margin: 0 4px; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--bg-secondary);
      border: 1px solid var(--accent);
      padding: 14px 28px;
      border-radius: 12px;
      font-size: 0.9rem;
      z-index: 1000;
      transition: transform 0.4s ease;
      box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ── Modal/Overlay ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px;
      max-width: 500px;
      width: 90%;
      text-align: center;
    }
    .modal h3 { font-size: 1.3rem; margin-bottom: 8px; }
    .modal .progress-text { color: var(--text-secondary); margin: 20px 0; font-size: 1rem; }
    .modal .big-progress {
      width: 100%;
      height: 8px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      overflow: hidden;
      margin: 20px 0;
    }
    .modal .big-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #8b5cf6, #3b82f6);
      border-radius: 10px;
      transition: width 0.5s ease;
      box-shadow: 0 0 10px var(--accent-glow);
    }
    .modal .batch-info { color: var(--text-muted); font-size: 0.85rem; }
    .modal .done-icon { font-size: 3rem; margin-bottom: 10px; }

    @media (max-width: 600px) {
      .header h1 { font-size: 2rem; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- Header -->
    <div class="header">
      <h1>🎬 כתוביות AI</h1>
      <p>חפש סרט, צור כתוביות בעברית, צפה ב-Stremio</p>
    </div>

    <!-- Search -->
    <div class="search-wrap">
      <input type="text" class="search-input" id="searchInput" placeholder="חפש סרט או סדרה..." autocomplete="off">
      <div class="search-icon">🔍</div>
    </div>

    <!-- Search Results -->
    <div id="searchResults"></div>

    <!-- Library -->
    <div id="librarySection">
      <h2 class="section-title">📚 <span>ספריית כתוביות</span> — מוכנות לצפייה</h2>
      <div id="libraryGrid" class="grid"></div>
    </div>

    <!-- Stremio Install -->
    <div class="install-banner">
      <h3>📲 התקנה ב-Stremio</h3>
      <p>פתח את Stremio → Add-ons → הדבק את הכתובת:</p>
      <div class="install-url" id="installUrl" onclick="copyInstallUrl()">טוען...</div>
    </div>

    <!-- Footer -->
    <div class="footer">
      AI Translated Subtitles v3 — נתוני סרטים מ-
      <img src="https://www.themoviedb.org/assets/2/v4/logos/v2/blue_short-8e7b30f73a4020692ccca9c88bafe5dcb6f8a62a4c6bc55cd9ba82bb2cd95f6c.svg" alt="TMDB">
      TMDB
    </div>
  </div>

  <!-- Progress Modal -->
  <div class="modal-overlay" id="progressModal">
    <div class="modal">
      <div id="modalIcon">⏳</div>
      <h3 id="modalTitle">יוצר כתוביות...</h3>
      <p class="progress-text" id="modalMessage">מתחיל...</p>
      <div class="big-progress">
        <div class="big-progress-fill" id="modalProgressBar" style="width: 0%"></div>
      </div>
      <div class="batch-info" id="modalBatch"></div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    const BASE = window.location.origin;
    let searchTimeout;

    // ── Init ──
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('installUrl').textContent = `${BASE}/manifest.json`;
      loadLibrary();
    });

    // ── Search ──
    document.getElementById('searchInput').addEventListener('input', (e) => {
      clearTimeout(searchTimeout);
      const q = e.target.value.trim();
      if (q.length < 2) {
        document.getElementById('searchResults').innerHTML = '';
        return;
      }
      searchTimeout = setTimeout(() => searchMovies(q), 400);
    });

    async function searchMovies(query) {
      const container = document.getElementById('searchResults');
      container.innerHTML = '<div class="loading"><div class="spinner"></div><br>מחפש...</div>';

      try {
        const res = await fetch(`${BASE}/api/search?q=${encodeURIComponent(query)}`);
        const data = await res.json();

        if (!data.results || data.results.length === 0) {
          container.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><p>לא נמצאו תוצאות</p></div>';
          return;
        }

        container.innerHTML = `<h2 class="section-title">🔎 <span>תוצאות חיפוש</span></h2><div class="grid" id="searchGrid"></div>`;
        const grid = document.getElementById('searchGrid');

        // Check status for all results
        for (const movie of data.results) {
          const card = createMovieCard(movie, false);
          grid.appendChild(card);
        }
      } catch (err) {
        container.innerHTML = '<div class="empty">שגיאה בחיפוש</div>';
      }
    }

    function createMovieCard(movie, isLibrary) {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <img class="card-poster" src="${movie.poster}" alt="${movie.title}" loading="lazy" 
             onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 300%22><rect fill=%22%231a1a2e%22 width=%22200%22 height=%22300%22/><text x=%2250%%22 y=%2250%%22 fill=%22%2364748b%22 text-anchor=%22middle%22 font-size=%2240%22>🎬</text></svg>'">
        <div class="card-info">
          <div class="card-title" title="${movie.title}">${movie.title}</div>
          <div class="card-meta">
            ${movie.year ? `<span>${movie.year}</span>` : ''}
            ${movie.rating ? `<span class="card-rating">⭐ ${movie.rating}</span>` : ''}
            ${movie.type ? `<span class="card-type">${movie.type === 'movie' ? 'סרט' : 'סדרה'}</span>` : ''}
          </div>
          <button class="btn ${isLibrary ? 'btn-done' : 'btn-generate'}" 
                  data-tmdb="${movie.tmdbId}" data-type="${movie.type || 'movie'}" data-title="${movie.title}" data-poster="${movie.poster}" data-year="${movie.year}"
                  ${isLibrary ? '' : `onclick="generateSubtitles(this)"`}>
            ${isLibrary ? '✅ כתוביות מוכנות' : '🎯 צור כתוביות עבריות'}
          </button>
        </div>
      `;
      return card;
    }

    // ── Generate Subtitles ──
    async function generateSubtitles(btn) {
      const tmdbId = btn.dataset.tmdb;
      const type = btn.dataset.type;
      const title = btn.dataset.title;
      const poster = btn.dataset.poster;
      const year = btn.dataset.year;

      // Step 1: Get IMDB ID
      btn.disabled = true;
      btn.textContent = 'מחפש...';

      try {
        const imdbRes = await fetch(`${BASE}/api/imdb/${tmdbId}?type=${type}`);
        const imdbData = await imdbRes.json();
        if (!imdbData.imdbId) {
          showToast('❌ לא נמצא IMDB ID לסרט זה');
          btn.disabled = false;
          btn.textContent = '🎯 צור כתוביות עבריות';
          return;
        }

        const imdbId = imdbData.imdbId;

        // Step 2: Start generation
        const genRes = await fetch(`${BASE}/api/generate`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ imdbId, type, title, poster, year })
        });
        const genData = await genRes.json();

        if (genData.status === 'exists') {
          btn.className = 'btn btn-done';
          btn.textContent = '✅ כתוביות מוכנות';
          showToast('✅ הכתוביות כבר קיימות!');
          return;
        }

        // Step 3: Show progress modal
        showProgressModal(title);
        listenToProgress(imdbId, btn);

      } catch (err) {
        showToast('❌ שגיאה: ' + err.message);
        btn.disabled = false;
        btn.textContent = '🎯 צור כתוביות עבריות';
      }
    }

    function showProgressModal(title) {
      document.getElementById('modalIcon').textContent = '⏳';
      document.getElementById('modalTitle').textContent = `יוצר כתוביות ל-${title}`;
      document.getElementById('modalMessage').textContent = 'מתחיל...';
      document.getElementById('modalProgressBar').style.width = '0%';
      document.getElementById('modalBatch').textContent = '';
      document.getElementById('progressModal').classList.add('active');
    }

    function listenToProgress(imdbId, btn) {
      const source = new EventSource(`${BASE}/api/progress/${imdbId}`);
      
      source.onmessage = (event) => {
        const p = JSON.parse(event.data);
        const modal = document.getElementById('progressModal');

        document.getElementById('modalMessage').textContent = p.message || '';

        if (p.status === 'downloading') {
          document.getElementById('modalProgressBar').style.width = '5%';
          document.getElementById('modalIcon').textContent = '📥';
        } else if (p.status === 'parsing') {
          document.getElementById('modalProgressBar').style.width = '10%';
          document.getElementById('modalIcon').textContent = '📝';
        } else if (p.status === 'translating' && p.totalBatches > 0) {
          const pct = 10 + (p.batch / p.totalBatches) * 85;
          document.getElementById('modalProgressBar').style.width = pct + '%';
          document.getElementById('modalBatch').textContent = p.batch > 0 ? `קבוצה ${p.batch} מתוך ${p.totalBatches}` : '';
          document.getElementById('modalIcon').textContent = '🤖';
        } else if (p.status === 'done') {
          document.getElementById('modalProgressBar').style.width = '100%';
          document.getElementById('modalIcon').textContent = '🎉';
          document.getElementById('modalTitle').textContent = 'הכתוביות מוכנות!';
          document.getElementById('modalMessage').textContent = 'פתח את Stremio וצפה עם כתוביות בעברית';
          document.getElementById('modalBatch').textContent = '';
          btn.className = 'btn btn-done';
          btn.textContent = '✅ כתוביות מוכנות';
          btn.disabled = false;
          source.close();
          loadLibrary();
          setTimeout(() => modal.classList.remove('active'), 3000);
        } else if (p.status === 'error') {
          document.getElementById('modalIcon').textContent = '❌';
          document.getElementById('modalTitle').textContent = 'שגיאה';
          document.getElementById('modalMessage').textContent = p.message;
          document.getElementById('modalProgressBar').style.width = '0%';
          btn.disabled = false;
          btn.textContent = '🎯 צור כתוביות עבריות';
          source.close();
          setTimeout(() => modal.classList.remove('active'), 4000);
        }
      };

      source.onerror = () => {
        source.close();
      };
    }

    // ── Library ──
    async function loadLibrary() {
      try {
        const res = await fetch(`${BASE}/api/library`);
        const data = await res.json();
        const grid = document.getElementById('libraryGrid');

        if (!data.library || data.library.length === 0) {
          grid.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><p>עדיין לא נוצרו כתוביות. חפש סרט למעלה!</p></div>';
          return;
        }

        grid.innerHTML = '';
        for (const movie of data.library) {
          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `
            ${movie.poster ? `<img class="card-poster" src="${movie.poster}" alt="${movie.title}" loading="lazy">` : ''}
            <div class="card-info">
              <div class="card-title" title="${movie.title}">${movie.title}</div>
              <div class="card-meta">
                ${movie.year ? `<span>${movie.year}</span>` : ''}
              </div>
              <button class="btn btn-done">✅ כתוביות מוכנות</button>
            </div>
          `;
          grid.appendChild(card);
        }
      } catch (err) {
        console.error('Library load error:', err);
      }
    }

    // ── Utils ──
    function copyInstallUrl() {
      const url = document.getElementById('installUrl').textContent;
      navigator.clipboard.writeText(url).then(() => showToast('📋 הכתובת הועתקה!'));
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }
  </script>
</body>
</html>
